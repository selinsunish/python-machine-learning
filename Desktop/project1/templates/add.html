<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Product</title>
    <style>
      :root{
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2a37;
        --muted: #5b6677;
        --border: #dbe6f5;
        --shadow: 0 10px 25px rgba(18, 43, 82, 0.06);
        --shadow-soft: 0 6px 16px rgba(18, 43, 82, 0.05);
        --blue: #5aa8ff;
        --blue-dark: #3c8fe8;
        --blue-ink: #0b57d0;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 18px 16px 40px;
      }

      .nav {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 16px;
        box-shadow: var(--shadow-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        font-weight: 900;
        color: var(--blue-ink);
        letter-spacing: 0.2px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav a {
        color: var(--blue-ink);
        text-decoration: none;
      }

      .nav a:hover { text-decoration: underline; }

      .nav-links {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .nav-links a.btn-link {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fbfdff;
        font-weight: 800;
      }

      .banner {
        margin-top: 14px;
        background: #e5f3ff;
        border: 1px solid #cfe7ff;
        color: #0b3d91;
        padding: 12px 14px;
        border-radius: 14px;
        font-weight: 700;
      }

      .page-title {
        margin-top: 18px;
        font-size: 1.3rem;
        font-weight: 900;
      }

      .form-card {
        margin-top: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow-soft);
        padding: 16px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 0.95rem;
        font-weight: 800;
        color: var(--muted);
      }

      input, textarea, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        outline: none;
        font-size: 1rem;
        box-sizing: border-box;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .error {
        background: #ffe9e9;
        border: 1px solid #ffb3b3;
        color: #a20000;
        padding: 10px 12px;
        border-radius: 12px;
        margin-bottom: 12px;
        font-weight: 700;
      }

      .btn {
        display: inline-block;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--blue);
        background: var(--blue);
        color: #fff;
        cursor: pointer;
        font-weight: 900;
        font-size: 1rem;
      }

      .btn:hover {
        background: var(--blue-dark);
      }

      .actions {
        margin-top: 14px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      @media (max-width: 700px) {
        .form-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="brand">🎓 College Resale</div>
        <div class="nav-links">
          <a href="{{ url_for('index') }}" class="btn-link">Home</a>
          <a href="{{ url_for('add_form') }}" class="btn-link">Add Product</a>
          <a href="{{ url_for('view_cart') }}" class="btn-link">Cart</a>
          <a href="{{ url_for('logout') }}" class="btn-link">Logout</a>
        </div>
      </div>

      <div class="banner">Buy, Sell &amp; Swap within your campus 🎓</div>

      <div class="page-title">Post a Campus Item</div>

      <div class="form-card">
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('add_product') }}">
          <div class="form-grid">
            <div class="field" style="grid-column: span 2;">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required />
            </div>

            <div class="field">
              <label for="price">Price</label>
              <input id="price" name="price" type="number" step="0.01" min="0" required />
            </div>

            <div class="field">
              <label for="condition">Condition</label>
              <select id="condition" name="condition" required>
                <option value="">Select condition</option>
                <option value="New">New</option>
                <option value="Good">Good</option>
                <option value="Used">Used</option>
              </select>
            </div>

            <div class="field" style="grid-column: span 2;">
              <label for="description">Description</label>
              <textarea id="description" name="description" required></textarea>
            </div>

            <div class="field">
              <label for="subject">Subject</label>
              <input id="subject" name="subject" type="text" placeholder="Example: Data Structures" required />
            </div>

            <div class="field">
              <label for="semester">Semester</label>
              <input id="semester" name="semester" type="text" placeholder="Example: 3" required />
            </div>

            <div class="field" style="grid-column: span 2;">
              <label for="branch">Branch</label>
              <input id="branch" name="branch" type="text" placeholder="Example: CSE" required />
            </div>
          </div>

          <div class="actions">
            <button class="btn" type="submit">Add Product</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
