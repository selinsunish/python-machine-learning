<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signup - College Resale</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      .box { max-width: 460px; border: 1px solid #ddd; padding: 1rem; border-radius: 8px; }
      label { display: block; margin-top: 0.75rem; font-weight: bold; }
      input { width: 100%; padding: 0.6rem; margin-top: 0.4rem; box-sizing: border-box; }
      .error { color: #b00020; margin-top: 0.75rem; }
      button { margin-top: 1rem; padding: 0.65rem 1rem; border: 0; border-radius: 6px; background: #0b57d0; color: #fff; cursor: pointer; }
      a { color: #0b57d0; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>Signup</h1>
    <div class="box">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('signup') }}">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="college">College</label>
        <input id="college" name="college" type="text" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Create Account</button>
      </form>
    </div>
    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </body>
</html>
