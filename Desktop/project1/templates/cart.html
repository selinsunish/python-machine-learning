<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Cart - College Resale</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      .top-links a { color: #0b57d0; text-decoration: none; margin-right: 0.75rem; }
      .top-links a:hover { text-decoration: underline; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 0.6rem 0; }
      .row { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
      .total { margin-top: 1rem; font-size: 1.1rem; font-weight: bold; }
      .btn { display: inline-block; margin-top: 1rem; padding: 0.65rem 1rem; border-radius: 6px; background: #0b57d0; color: #fff; text-decoration: none; }
      .btn:hover { opacity: 0.9; text-decoration: none; }
    </style>
  </head>
  <body>
    <h1>Your Cart</h1>
    <p class="top-links">
      <a href="{{ url_for('index') }}">Back to products</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </p>

    {% if items %}
      {% for item in items %}
        <div class="card">
          <div class="row">
            <strong>{{ item.name }}</strong>
            <span>${{ '%.2f'|format(item.price) }} x {{ item.quantity }}</span>
          </div>
        </div>
      {% endfor %}
      <div class="total">Total: ${{ '%.2f'|format(total) }}</div>
      <a class="btn" href="{{ url_for('checkout') }}">Proceed to Checkout</a>
    {% else %}
      <p>Your cart is empty.</p>
    {% endif %}
  </body>
</html>
